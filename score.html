<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

.viewer{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:100vh;
}

.viewer img{
  width:100%;
  height:100vh;
  object-fit:contain;
  flex-shrink:0;
  scroll-snap-align:center;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← 戻る</button>

<div class="viewer" id="viewer"></div>

<script>
const params = new URLSearchParams(location.search);
const images = params.get("img");

if(images){
  const list = images.split(",");
  const viewer = document.getElementById("viewer");

  list.forEach(src=>{
    const img = document.createElement("img");
    img.src = src;
    viewer.appendChild(img);
  });
}
</script>

</body>
</html>
